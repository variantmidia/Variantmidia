dow-use\">Labels, badges, elementos sem destaque<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"shadow-item shadow-md-demo\">\n      <div class=\"shadow-name\">Shadow MD<\u002Fdiv>\n      <div class=\"shadow-use\">Cards padrão, modais, dropdowns<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"shadow-item shadow-lg-demo\">\n      <div class=\"shadow-name\">Shadow LG<\u002Fdiv>\n      <div class=\"shadow-use\">Logo panel, hero card, elementos hero<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ 06 COMPONENTES ════════════════════════════════════ -->\n<section id=\"componentes\" class=\"section\" data-screen-label=\"06 Componentes\">\n  <div class=\"section-rule\">\n    <span class=\"section-num\">06<\u002Fspan>\n    <div class=\"section-divider\"><\u002Fdiv>\n    <span class=\"section-tag\">Componentes<\u002Fspan>\n  <\u002Fdiv>\n\n  <h2 class=\"section-title reveal\">Peças do <em>sistema.<\u002Fem><\u002Fh2>\n  <p class=\"section-intro reveal\">Todos os componentes seguem os mesmos tokens. Um botão primário nunca muda de cor; um card nunca muda de radius. Consistência é legibilidade de sistema.<\u002Fp>\n\n  <div class=\"comp-section reveal\">\n    <div class=\"comp-title\">Botões<\u002Fdiv>\n    <div class=\"btn-row\">\n      <button class=\"btn btn-primary\">Primário<\u002Fbutton>\n      <button class=\"btn btn-cyan\">Ciano<\u002Fbutton>\n      <button class=\"btn btn-ghost\">Secundário<\u002Fbutton>\n      <button class=\"btn btn-primary btn-sm\">Pequeno<\u002Fbutton>\n      <button class=\"btn btn-primary btn-lg\">Grande<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"margin-top:16px; display:grid; grid-template-columns:repeat(3,1fr); gap:12px;\">\n      <div style=\"padding:16px; border:1px solid var(--line-soft); border-radius:var(--r-sm); background:rgba(255,255,255,.5);\">\n        <div style=\"font-family:var(--f-mono); font-size:10px; color:var(--muted3); letter-spacing:.08em; margin-bottom:6px; text-transform:uppercase;\">Primário<\u002Fdiv>\n        <p style=\"font-size:12px; color:var(--muted); line-height:1.5;\">Background ink, cor branca. Uma por tela. CTA principal.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:16px; border:1px solid var(--line-soft); border-radius:var(--r-sm); background:rgba(255,255,255,.5);\">\n        <div style=\"font-family:var(--f-mono); font-size:10px; color:var(--muted3); letter-spacing:.08em; margin-bottom:6px; text-transform:uppercase;\">Ciano<\u002Fdiv>\n        <p style=\"font-size:12px; color:var(--muted); line-height:1.5;\">Background ciano, texto ink. Destaque pontual, não substitui primário.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:16px; border:1px solid var(--line-soft); border-radius:var(--r-sm); background:rgba(255,255,255,.5);\">\n        <div style=\"font-family:var(--f-mono); font-size:10px; color:var(--muted3); letter-spacing:.08em; margin-bottom:6px; text-transform:uppercase;\">Secundário<\u002Fdiv>\n        <p style=\"font-size:12px; color:var(--muted); line-height:1.5;\">Borda cool, sem fill. Para ação secundária, nunca ao lado de ciano.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"comp-section reveal\">\n    <div class=\"comp-title\">Badges &amp; Status<\u002Fdiv>\n    <div class=\"badge-row\">\n      <span class=\"badge badge-cyan\"><span class=\"badge-dot\"><\u002Fspan>Ciano<\u002Fspan>\n      <span class=\"badge badge-dark\">Neutro<\u002Fspan>\n      <span class=\"badge badge-ok\"><span class=\"badge-dot\"><\u002Fspan>Confirmado<\u002Fspan>\n      <span class=\"badge badge-warn\"><span class=\"badge-dot\"><\u002Fspan>Atenção<\u002Fspan>\n      <span class=\"badge badge-crit\"><span class=\"badge-dot\"><\u002Fspan>Crítico<\u002Fspan>\n      <span class=\"badge badge-live\"><span class=\"badge-dot\" style=\"animation:pulse 1.6s infinite;\"><\u002Fspan>Live<\u002Fspan>\n    <\u002Fdiv>\n    <style>@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }<\u002Fstyle>\n  <\u002Fdiv>\n\n  <div class=\"comp-section reveal\">\n    <div class=\"comp-title\">Cards<\u002Fdiv>\n    <div class=\"card-row\">\n      <div class=\"demo-card\">\n        <div class=\"demo-card-eyebrow\">Diagnóstico<\u002Fdiv>\n        <h4>Onde a receita vaza<\u002Fh4>\n        <p>Mapeamento completo dos pontos de perda no funil comercial do escritório.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"demo-card\">\n        <div class=\"demo-card-eyebrow\">Operação<\u002Fdiv>\n        <h4>Plano de ação com dono<\u002Fh4>\n        <p>Cada entrega tem responsável, prazo e métrica de sucesso. Sem achismo.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"demo-card\">\n        <div class=\"demo-card-eyebrow\">Performance<\u002Fdiv>\n        <h4>Resultado mensurável<\u002Fh4>\n        <p>Tracking semanal com relatório direto ao gestor. Dados, não narrativa.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"comp-section reveal\">\n    <div class=\"comp-title\">Campos de formulário<\u002Fdiv>\n    <div class=\"input-row\">\n      <div>\n        <div class=\"field-label\">Nome completo<\u002Fdiv>\n        <input class=\"field-input\" type=\"text\" placeholder=\"João Silva\" readonly=\"\">\n      <\u002Fdiv>\n      <div>\n        <div class=\"field-label\">E-mail<\u002Fdiv>\n        <input class=\"field-input\" type=\"email\" placeholder=\"joao@escritorio.com.br\" readonly=\"\">\n      <\u002Fdiv>\n      <div>\n        <div class=\"field-label\">Campo com erro<\u002Fdiv>\n        <input class=\"field-input error\" type=\"text\" value=\"Valor inválido\" readonly=\"\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"comp-section reveal\">\n    <div class=\"comp-title\">Régua de seção editorial<\u002Fdiv>\n    <div style=\"border: 1px solid var(--line); border-radius:var(--r-sm); padding:28px; background:rgba(255,255,255,.7);\">\n      <div class=\"section-rule-demo\">\n        <span class=\"rule-num\">03 / 11<\u002Fspan>\n        <div style=\"flex:1; height:1px; background:var(--ink);\"><\u002Fdiv>\n        <span class=\"rule-num\" style=\"color:var(--muted3);\">Dor — onde a receita vaza<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"margin-top:16px; font-size:14px; color:var(--muted);\">O divisor editorial usa ink como cor da linha, números mono como índice de seção. Nunca usar ciano na linha — reservado para acentos de conteúdo.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"comp-section reveal\">\n    <div class=\"comp-title\">Painel escuro<\u002Fdiv>\n    <div class=\"dark-panel-demo\">\n      <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:16px;\">\n        <span style=\"font-family:var(--f-mono); font-size:10px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:rgba(213,222,230,.45);\">Bastidor operacional<\u002Fspan>\n      <\u002Fdiv>\n      <h4>IA, métricas live e operação de atendimento podem usar o painel escuro.<\u002Fh4>\n      <p>O painel escuro é pontual. A marca não se torna dark SaaS. Usar no máximo em uma seção por página, com saída de volta para o fundo claro.<\u002Fp>\n      <div style=\"display:flex; gap:12px; margin-top:24px; flex-wrap:wrap;\">\n        <span class=\"badge badge-live\" style=\"background:rgba(52,211,153,.12); border-color:rgba(52,211,153,.25);\"><span class=\"badge-dot\" style=\"background:var(--live); animation:pulse 1.6s infinite;\"><\u002Fspan>Triagem ativa<\u002Fspan>\n        <span class=\"badge\" style=\"background:rgba(22,212,232,.12); color:var(--cyan); border:1px solid rgba(22,212,232,.25);\">3 leads hoje<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ 07 MOTION ═════════════════════════════════════════ -->\n<section id=\"motion\" class=\"section\" data-screen-label=\"07 Motion\">\n  <div class=\"section-rule\">\n    <span class=\"section-num\">07<\u002Fspan>\n    <div class=\"section-divider\"><\u002Fdiv>\n    <span class=\"section-tag\">Motion<\u002Fspan>\n  <\u002Fdiv>\n\n  <h2 class=\"section-title reveal\">Movimento<br><em>com função.<\u002Fem><\u002Fh2>\n  <p class=\"section-intro reveal\">Animação na Variant explica causa e sequência. Nunca decora. Todo motion usa transform e opacity — nunca width/height. Reduced-motion sempre respeitado.<\u002Fp>\n\n  <div class=\"motion-grid reveal\">\n    <div class=\"motion-demo\">\n      <h4>Microinteração<\u002Fh4>\n      <p>Hover e focus entre 150ms e 250ms. Botões sobem no máximo 2px. Campos iluminam a borda com ciano.<\u002Fp>\n      <span class=\"motion-spec\">150–250ms · cubic-bezier(.2,.7,.2,1)<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"motion-demo\">\n      <h4>Entrada de seção<\u002Fh4>\n      <p>Reveal com opacity 0→1 e translateY 24px→0. Entre 300ms e 480ms. Stagger de 80ms quando há lista.<\u002Fp>\n      <span class=\"motion-spec\">300–480ms · stagger 80ms<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"motion-demo\">\n      <h4>Modal &amp; Dropdown<\u002Fh4>\n      <p>Abertura com scale .97→1 + opacity 0→1. Fechamento reverso, mais rápido. Foco retorna ao trigger.<\u002Fp>\n      <span class=\"motion-spec\">200ms open · 140ms close<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"motion-demo\">\n      <h4>Indicador live<\u002Fh4>\n      <p>Pulse suave no badge de status ativo. Loop contínuo com opacity 1→.35→1. Nunca em conteúdo estático.<\u002Fp>\n      <span class=\"motion-spec\">1.6s · infinite · opacity only<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"do-dont-grid reveal\">\n    <div class=\"do-box\">\n      <strong>Usar<\u002Fstrong>\n      <ul>\n        <li>transform: translate / scale / rotate<\u002Fli>\n        <li>opacity<\u002Fli>\n        <li>Duração entre 150ms e 480ms<\u002Fli>\n        <li>cubic-bezier(.2, .7, .2, 1)<\u002Fli>\n        <li>Stagger em listas (80ms entre items)<\u002Fli>\n        <li>reduced-motion: sem animação<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"dont-box\">\n      <strong>Evitar<\u002Fstrong>\n      <ul>\n        <li>Animação de width, height, padding<\u002Fli>\n        <li>Loops decorativos sem informação<\u002Fli>\n        <li>Duração acima de 500ms em microinterações<\u002Fli>\n        <li>Parallax exagerado ou scroll-triggered complexo<\u002Fli>\n        <li>Motion no corpo de texto longo<\u002Fli>\n        <li>Mais de 3 elementos animando ao mesmo tempo<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ 08 VOZ & TOM ══════════════════════════════════════ -->\n<section id=\"voz\" class=\"section\" data-screen-label=\"08 Voz e Tom\">\n  <div class=\"section-rule\">\n    <span class=\"section-num\">08<\u002Fspan>\n    <div class=\"section-divider\"><\u002Fdiv>\n    <span class=\"section-tag\">Voz &amp; Tom<\u002Fspan>\n  <\u002Fdiv>\n\n  <h2 class=\"section-title reveal\">Seco,<br><em>preciso,<\u002Fem><br>comercial.<\u002Fh2>\n  <p class=\"section-intro reveal\">A Variant não vende promessa. Vende diagnóstico. A linguagem é adulta, direta e orientada a resultado. Sem motivacional, sem adjetivo vago, sem clichê jurídico.<\u002Fp>\n\n  <div class=\"brand-statement reveal\">\n    <blockquote>Menos promessa de marketing.<br>Mais diagnóstico sobre onde a receita realmente vaza.<\u002Fblockquote>\n  <\u002Fdiv>\n\n  <div class=\"tone-grid reveal\">\n    <div class=\"tone-card\">\n      <h4>Precisa<\u002Fh4>\n      <p>Cada frase carrega uma informação específica. Sem enchimento. Se pode cortar uma palavra sem perder significado, corte. A marca fala como quem sabe o que está fazendo.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"tone-card\">\n      <h4>Operacional<\u002Fh4>\n      <p>A linguagem reflete o produto: diagnóstico, plano de ação, execução, resultado. Termos como \"módulo\", \"etapa\", \"entrega\" e \"métrica\" são permitidos — eles constroem confiança técnica.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"tone-card\">\n      <h4>Editorial<\u002Fh4>\n      <p>Headlines são curtas e têm tensão. Não \"Crescimento sustentável para escritórios\" — mas \"Onde a sua receita vaza\". A edição é o estilo. Menos palavras, mais impacto.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"tone-card\">\n      <h4>Adulta<\u002Fh4>\n      <p>Sem exclamação, sem emoji em documentos, sem \"incrível\" ou \"revolucionário\". A Variant fala com gestores experientes. O tom assume que o interlocutor já sabe o que é consultoria.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"eyebrow reveal\" style=\"margin-bottom:16px;\">Certo vs. errado<\u002Fdiv>\n  <div class=\"copy-examples reveal\">\n    <div class=\"copy-pair\">\n      <div class=\"copy-bad\">\n        <div class=\"copy-label\">Não usar<\u002Fdiv>\n        <p>Transformamos escritórios com soluções inovadoras e resultados incríveis!<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"copy-good\">\n        <div class=\"copy-label\">Usar<\u002Fdiv>\n        <p>Diagnóstico completo de onde sua receita vaza — com plano de ação e dono definido.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"copy-pair\">\n      <div class=\"copy-bad\">\n        <div class=\"copy-label\">Não usar<\u002Fdiv>\n        <p>Nossa metodologia exclusiva revoluciona a gestão comercial do seu negócio<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"copy-good\">\n        <div class=\"copy-label\">Usar<\u002Fdiv>\n        <p>Método em 4 etapas: diagnóstico, priorização, execução e acompanhamento semanal.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"copy-pair\">\n      <div class=\"copy-bad\">\n        <div class=\"copy-label\">Não usar<\u002Fdiv>\n        <p>Estamos aqui para ajudar você a alcançar seu máximo potencial de crescimento!<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"copy-good\">\n        <div class=\"copy-label\">Usar<\u002Fdiv>\n        <p>Triagem, qualificação e follow-up com responsável — sem depender de memória do advogado.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"eyebrow reveal\" style=\"margin-bottom:16px;\">Personalidade<\u002Fdiv>\n  <div class=\"personality-tags reveal\">\n    <span class=\"ptag active\">Precisa<\u002Fspan>\n    <span class=\"ptag active\">Operacional<\u002Fspan>\n    <span class=\"ptag active\">Editorial<\u002Fspan>\n    <span class=\"ptag active\">Adulta<\u002Fspan>\n    <span class=\"ptag active\">Consultiva<\u002Fspan>\n    <span class=\"ptag\">≠ Motivacional<\u002Fspan>\n    <span class=\"ptag\">≠ Genérica<\u002Fspan>\n    <span class=\"ptag\">≠ Inflada<\u002Fspan>\n    <span class=\"ptag\">≠ Jargão jurídico<\u002Fspan>\n    <span class=\"ptag\">≠ Dark SaaS<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ 09 APLICAÇÕES ════════════════════════════════════ -->\n<section id=\"aplicacoes\" class=\"section\" data-screen-label=\"09 Aplicações\">\n  <div class=\"section-rule\">\n    <span class=\"section-num\">09<\u002Fspan>\n    <div class=\"section-divider\"><\u002Fdiv>\n    <span class=\"section-tag\">Aplicações<\u002Fspan>\n  <\u002Fdiv>\n\n  <h2 class=\"section-title reveal\">A marca<br>em <em>campo.<\u002Fem><\u002Fh2>\n  <p class=\"section-intro reveal\">Como o sistema visual se comporta nas principais superfícies — social, proposta comercial, landing e documento institucional.<\u002Fp>\n\n  <div class=\"app-grid reveal\">\n    <div class=\"app-frame\">\n      <div class=\"app-frame-header\">Social — Post quadrado 1:1<\u002Fdiv>\n      <div class=\"social-card\">\n        <div class=\"social-card-content\">\n          <h4>Você sabe onde sua receita está vazando?<\u002Fh4>\n          <p>3 de cada 4 escritórios perdem leads antes do primeiro contato. Diagnóstico gratuito.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"social-card-footer\">\n          <span class=\"social-logo\">VARIANT MÍDIA<\u002Fspan>\n          <span class=\"social-tag\">variantmidia.com.br<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"app-frame\">\n      <div class=\"app-frame-header\">Proposta comercial<\u002Fdiv>\n      <div class=\"proposta-preview\">\n        <div class=\"proposta-header\">\n          <div>\n            <div class=\"proposta-num\">PROPOSTA #VM-2026-047<\u002Fdiv>\n            <div class=\"proposta-title\">Diagnóstico Comercial<\u002Fdiv>\n          <\u002Fdiv>\n          <img src=\"705ad1ff-3266-4dcb-8c17-4db57558b0fc\" alt=\"VM\" style=\"width:120px; flex-shrink:0;\">\n        <\u002Fdiv>\n        <div class=\"proposta-rows\">\n          <div class=\"proposta-row\">\n            <span class=\"proposta-row-name\">Diagnóstico inicial (2 semanas)<\u002Fspan>\n            <span class=\"proposta-row-val\">Incluso<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"proposta-row\">\n            <span class=\"proposta-row-name\">Plano de ação com priorização<\u002Fspan>\n            <span class=\"proposta-row-val\">Incluso<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"proposta-row\">\n            <span class=\"proposta-row-name\">Acompanhamento mensal<\u002Fspan>\n            <span class=\"proposta-row-val\">R$ 2.400/mês<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"proposta-total\">\n          <span>Investimento mensal<\u002Fspan>\n          <strong>R$ 2.400<\u002Fstrong>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"app-frame\">\n      <div class=\"app-frame-header\">Seção de landing<\u002Fdiv>\n      <div class=\"landing-preview\">\n        <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:4px;\">\n          <div style=\"width:6px; height:6px; border-radius:1px; background:var(--cyan); box-shadow:0 0 0 3px var(--cyan-dim);\"><\u002Fdiv>\n          <span class=\"landing-eyebrow\">Diagnóstico comercial<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"landing-h\">Onde a sua<br><em>receita vaza.<\u002Fem><\u002Fdiv>\n        <p class=\"landing-p\">Mapeamos cada ponto de perda no funil de aquisição do escritório — com dados, responsável e prazo de correção.<\u002Fp>\n        <div class=\"landing-actions\">\n          <button class=\"btn btn-primary btn-sm\" style=\"cursor:default;\">Quero diagnóstico<\u002Fbutton>\n          <button class=\"btn btn-ghost btn-sm\" style=\"cursor:default;\">Ver método<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"app-frame\">\n      <div class=\"app-frame-header\">Documento institucional<\u002Fdiv>\n      <div class=\"doc-preview\">\n        <div class=\"doc-heading-row\">\n          <span class=\"doc-num\">01 / 05<\u002Fspan>\n          <div style=\"flex:1; height:1px; background:var(--ink);\"><\u002Fdiv>\n          <span class=\"doc-h\">Diagnóstico<\u002Fspan>\n        <\u002Fdiv>\n        <p class=\"doc-p\">Levantamento completo dos pontos de perda no funil comercial. Inclui entrevistas com time, análise de CRM e mapeamento de jornada de contato.<\u002Fp>\n        <p class=\"doc-p\">Entrega: relatório com ranking de prioridades e estimativa de receita recuperável.<\u002Fp>\n        <div class=\"doc-highlight\">Resultado esperado: identificação de 3–5 gargalos com impacto direto na taxa de conversão.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"reveal\" style=\"margin-top:40px;\">\n    <div class=\"dark-panel-demo\">\n      <div style=\"display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:24px;\">\n        <div>\n          <div style=\"font-family:var(--f-mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:rgba(213,222,230,.4); margin-bottom:12px;\">Interface operacional<\u002Fdiv>\n          <h4 style=\"margin:0;\">Dashboard de triagem e acompanhamento usam o painel escuro com ciano como sinal de status.<\u002Fh4>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:10px; min-width:200px;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); border-radius:var(--r-sm);\">\n            <span style=\"font-size:13px; color:var(--panel-text);\">Leads esta semana<\u002Fspan>\n            <span style=\"font-family:var(--f-mono); font-size:14px; font-weight:600; color:var(--cyan);\">14<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); border-radius:var(--r-sm);\">\n            <span style=\"font-size:13px; color:var(--panel-text);\">Taxa de conversão<\u002Fspan>\n            <span style=\"font-family:var(--f-mono); font-size:14px; font-weight:600; color:var(--live);\">38%<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); border-radius:var(--r-sm);\">\n            <span style=\"font-size:13px; color:var(--panel-text);\">Follow-ups pendentes<\u002Fspan>\n            <span style=\"font-family:var(--f-mono); font-size:14px; font-weight:600; color:var(--warn);\">3<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ─── FOOTER ─────────────────────────────────────────── -->\n<footer class=\"footer\">\n  <div class=\"footer-inner\">\n    <div>\n      <img class=\"footer-logo\" src=\"350d6a8f-6843-4678-ba44-31212d282d4b\" alt=\"Variant Mídia\">\n      <p class=\"footer-copy\">Sistema visual oficial da Variant Mídia. Versão 1.0 — Maio 2026. Para uso interno e aprovação de parceiros. Toda adaptação deve seguir os tokens e regras definidos aqui.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"footer-meta\">\n      <div class=\"footer-col\">\n        <strong>Paleta<\u002Fstrong>\n        <ul>\n          <li>Ciano #16D4E8<\u002Fli>\n          <li>Grafite #2B2B2B<\u002Fli>\n          <li>Ink #1A1A1A<\u002Fli>\n          <li>Painel #0E1620<\u002Fli>\n          <li>BG #F2F4F1<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"footer-col\">\n        <strong>Tipografia<\u002Fstrong>\n        <ul>\n          <li>Syne — Display<\u002Fli>\n          <li>DM Sans — Body<\u002Fli>\n          <li>JetBrains Mono — Labels<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"footer-col\">\n        <strong>Contato<\u002Fstrong>\n        <ul>\n          <li>variantmidia.com.br<\u002Fli>\n          <li>Brand inquiries:<\u002Fli>\n          <li>design@variantmidia<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fmain>\n<\u002Fdiv>\n\n<script>\n// ─── SCROLL REVEAL ────────────────────────────────────────\nconst revealEls = document.querySelectorAll('.reveal');\nconst observer = new IntersectionObserver((entries) => {\n  entries.forEach(e => {\n    if (e.isIntersecting) {\n      e.target.classList.add('visible');\n      observer.unobserve(e.target);\n    }\n  });\n}, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });\nrevealEls.forEach(el => observer.observe(el));\n\n// ─── ACTIVE NAV ───────────────────────────────────────────\nconst sections = document.querySelectorAll('[data-screen-label]');\nconst navLinks = document.querySelectorAll('.nav-item a');\nconst navObserver = new IntersectionObserver((entries) => {\n  entries.forEach(e => {\n    if (e.isIntersecting) {\n      const id = e.target.id;\n      navLinks.forEach(l => {\n        l.classList.toggle('active', l.getAttribute('href') === '#' + id);\n      });\n    }\n  });\n}, { threshold: 0.3 });\nsections.forEach(s => navObserver.observe(s));\n\n// ─── MOBILE NAV ───────────────────────────────────────────\nconst mobileBtn = document.getElementById('mobileNavBtn');\nconst sidebar = document.getElementById('sidebar');\nmobileBtn.addEventListener('click', () => {\n  sidebar.classList.toggle('open');\n});\nsidebar.querySelectorAll('a').forEach(a => {\n  a.addEventListener('click', () => sidebar.classList.remove('open'));\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
