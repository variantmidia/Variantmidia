  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

 {\n  --cyan:        #16D4E8;\n  --cyan-deep:   #0FB8CC;\n  --cyan-dim:    rgba(22,212,232,.12);\n  --graphite:    #2B2B2B;\n  --ink:         #1A1A1A;\n  --ink2:        #101820;\n  --muted:       #5A5A52;\n  --muted2:      #6A6A60;\n  --muted3:      #9A9A90;\n  --bg:          #F2F4F1;\n  --bg-alt:      #F7FAFA;\n  --surface:     #FFFFFF;\n  --line:        #E2E2D6;\n  --line-cool:   #E6EEF2;\n  --line-soft:   #EFF4F6;\n  --panel:       #0E1620;\n  --panel2:      #131C27;\n  --panel-text:  #D5DEE6;\n  --ok:          #1F9D6F;\n  --warn:        #C97A1B;\n  --crit:        #C03B3B;\n  --live:        #34D399;\n\n  --f-display: 'Syne', sans-serif;\n  --f-body:    'DM Sans', sans-serif;\n  --f-mono:    'JetBrains Mono', monospace;\n\n  --r-xs: 4px;\n  --r-sm: 8px;\n  --r:    12px;\n  --r-lg: 16px;\n  --r-pill: 999px;\n\n  --ease: cubic-bezier(.2,.7,.2,1);\n}\n\n/* ─── RESET ──────────────────────────────────────────── */\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\nhtml { scroll-behavior: smooth; }\nbody {\n  font-family: var(--f-body);\n  font-size: 16px;\n  line-height: 1.6;\n  color: var(--ink);\n  background: var(--bg);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\nimg, svg { max-width: 100%; display: block; }\na { color: inherit; text-decoration: none; }\n\n/* ─── LAYOUT ─────────────────────────────────────────── */\n.page {\n  display: grid;\n  grid-template-columns: 220px 1fr;\n  min-height: 100vh;\n}\n\n/* ─── SIDEBAR NAV ────────────────────────────────────── */\n.sidebar {\n  position: sticky;\n  top: 0;\n  height: 100vh;\n  display: flex;\n  flex-direction: column;\n  background: var(--ink2);\n  border-right: 1px solid rgba(255,255,255,.06);\n  overflow-y: auto;\n  z-index: 100;\n}\n.sidebar-logo {\n  padding: 32px 24px 28px;\n  border-bottom: 1px solid rgba(255,255,255,.07);\n}\n.sidebar-logo img {\n  width: 140px;\n}\n.sidebar-label {\n  margin-top: 10px;\n  font-family: var(--f-mono);\n  font-size: 10px;\n  font-weight: 500;\n  letter-spacing: .12em;\n  text-transform: uppercase;\n  color: rgba(213,222,230,.38);\n}\n.nav-list {\n  list-style: none;\n  padding: 20px 0 32px;\n  flex: 1;\n}\n.nav-item a {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  padding: 10px 24px;\n  font-family: var(--f-mono);\n  font-size: 11px;\n  font-weight: 500;\n  letter-spacing: .06em;\n  color: rgba(213,222,230,.5);\n  transition: color 180ms var(--ease), background 180ms var(--ease);\n}\n.nav-item a:hover {\n  color: var(--panel-text);\n  background: rgba(255,255,255,.04);\n}\n.nav-item a.active {\n  color: var(--cyan);\n  background: rgba(22,212,232,.07);\n}\n.nav-num {\n  font-size: 10px;\n  opacity: .5;\n  min-width: 18px;\n}\n\n/* ─── MAIN CONTENT ───────────────────────────────────── */\n.main {\n  min-width: 0;\n}\n\n/* ─── SECTION BASE ───────────────────────────────────── */\n.section {\n  padding: clamp(80px, 10vw, 140px) clamp(40px, 7vw, 96px);\n  border-bottom: 1px solid var(--line);\n}\n.section:nth-child(even) {\n  background: var(--bg-alt);\n}\n\n.section-rule {\n  display: flex;\n  align-items: center;\n  gap: 16px;\n  margin-bottom: 48px;\n  padding-bottom: 20px;\n  border-bottom: 1px solid var(--ink);\n}\n.section-num {\n  font-family: var(--f-mono);\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: .14em;\n  text-transform: uppercase;\n  color: var(--muted2);\n}\n.section-divider {\n  flex: 1;\n}\n.section-tag {\n  font-family: var(--f-mono);\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: .14em;\n  text-transform: uppercase;\n  color: var(--muted3);\n}\n\nh2.section-title {\n  font-family: var(--f-display);\n  font-size: clamp(36px, 5vw, 68px);\n  font-weight: 800;\n  letter-spacing: -.035em;\n  line-height: .96;\n  color: var(--ink);\n  margin-bottom: 20px;\n}\nh2.section-title em {\n  font-style: italic;\n  font-weight: 400;\n  color: var(--cyan-deep);\n  font-family: Georgia, serif;\n}\n.section-intro {\n  max-width: 56ch;\n  font-size: 17px;\n  color: var(--muted);\n  line-height: 1.6;\n  margin-bottom: 56px;\n}\n\n/* ─── GRID UTILITIES ─────────────────────────────────── */\n.grid { display: grid; gap: 16px; }\n.g2 { grid-template-columns: repeat(2, 1fr); }\n.g3 { grid-template-columns: repeat(3, 1fr); }\n.g4 { grid-template-columns: repeat(4, 1fr); }\n.g5 { grid-template-columns: repeat(5, 1fr); }\n\n/* ─── CARD ───────────────────────────────────────────── */\n.card {\n  border: 1px solid var(--line);\n  border-radius: var(--r-sm);\n  background: rgba(255,255,255,.78);\n  padding: 24px;\n}\n.card.dark {\n  background: var(--panel2);\n  border-color: rgba(255,255,255,.07);\n  color: var(--panel-text);\n}\n\n/* ─── EYEBROW ────────────────────────────────────────── */\n.eyebrow {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  font-family: var(--f-mono);\n  font-size: 10px;\n  font-weight: 600;\n  letter-spacing: .14em;\n  text-transform: uppercase;\n  color: var(--muted2);\n  margin-bottom: 12px;\n}\n.eyebrow::before {\n  content: '';\n  width: 6px; height: 6px;\n  border-radius: 1px;\n  background: var(--cyan);\n  box-shadow: 0 0 0 3px var(--cyan-dim);\n  flex-shrink: 0;\n}\n\n/* ═══════════════════════════════════════════════════════\n   01 — CAPA\n══════════════════════════════════════════════════════ */\n#cover {\n  min-height: 100vh;\n  display: flex;\n  flex-direction: column;\n  justify-content: space-between;\n  padding: clamp(56px, 8vw, 96px) clamp(40px, 7vw, 96px);\n  background: var(--ink2);\n  color: var(--panel-text);\n  border-bottom: 1px solid rgba(255,255,255,.06);\n  position: relative;\n  overflow: hidden;\n}\n#cover::before {\n  content: '';\n  position: absolute;\n  inset: 0;\n  background:\n    radial-gradient(ellipse 60% 50% at 0% 0%, rgba(22,212,232,.13) 0%, transparent 60%),\n    radial-gradient(ellipse 40% 40% at 100% 100%, rgba(22,212,232,.07) 0%, transparent 50%);\n  pointer-events: none;\n}\n.cover-grid-bg {\n  position: absolute;\n  inset: 0;\n  background-image:\n    linear-gradient(rgba(239,244,246,.04) 1px, transparent 1px),\n    linear-gradient(90deg, rgba(239,244,246,.04) 1px, transparent 1px);\n  background-size: 64px 64px;\n  pointer-events: none;\n}\n.cover-top {\n  position: relative;\n  z-index: 1;\n}\n.cover-logo {\n  width: min(320px, 60%);\n}\n.cover-mid {\n  position: relative;\n  z-index: 1;\n  margin-top: 80px;\n}\n.cover-headline {\n  font-family: var(--f-display);\n  font-size: clamp(64px, 12vw, 160px);\n  font-weight: 800;\n  letter-spacing: -.045em;\n  line-height: .88;\n  color: #fff;\n}\n.cover-headline em {\n  display: block;\n  color: var(--cyan);\n  font-style: italic;\n  font-family: Georgia, serif;\n  font-weight: 400;\n}\n.cover-sub {\n  margin-top: 36px;\n  font-size: clamp(15px, 1.6vw, 18px);\n  color: rgba(213,222,230,.62);\n  max-width: 52ch;\n  line-height: 1.6;\n}\n.cover-bottom {\n  position: relative;\n  z-index: 1;\n  display: flex;\n  justify-content: space-between;\n  align-items: flex-end;\n  flex-wrap: wrap;\n  gap: 24px;\n  padding-top: 40px;\n  border-top: 1px solid rgba(255,255,255,.1);\n}\n.cover-meta {\n  display: flex;\n  gap: 48px;\n  flex-wrap: wrap;\n}\n.cover-meta-item strong {\n  display: block;\n  font-family: var(--f-mono);\n  font-size: 10px;\n  font-weight: 600;\n  letter-spacing: .12em;\n  text-transform: uppercase;\n  color: rgba(213,222,230,.4);\n  margin-bottom: 4px;\n}\n.cover-meta-item span {\n  font-size: 14px;\n  color: rgba(213,222,230,.7);\n}\n.cover-version {\n  font-family: var(--f-mono);\n  font-size: 11px;\n  color: rgba(213,222,230,.3);\n  letter-spacing: .08em;\n}\n\n/* ═══════════════════════════════════════════════════════\n   02 — MARCA & LOGO\n══════════════════════════════════════════════════════ */\n.logo-showcase {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 16px;\n  margin-bottom: 40px;\n}\n.logo-block {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  min-height: 200px;\n  border: 1px solid var(--line);\n  border-radius: var(--r-sm);\n  padding: 40px;\n}\n.logo-block.on-light { background: var(--surface); }\n.logo-block.on-warm  { background: var(--bg); }\n.logo-block.on-dark  {\n  background: radial-gradient(circle at 20% 10%, rgba(22,212,232,.15), transparent 40%), var(--panel);\n  border-color: rgba(255,255,255,.08);\n}\n.logo-block.on-graphite { background: var(--graphite); border-color: transparent; }\n.logo-block img { width: min(280px, 80%); height: auto; }\n\n.logo-anatomy {\n  margin: 48px 0 32px;\n  padding: 40px;\n  border: 1px solid var(--line-cool);\n  border-radius: var(--r-sm);\n  background: var(--bg-alt);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  gap: clamp(32px, 6vw, 80px);\n  flex-wrap: wrap;\n}\n.anatomy-logo { width: min(340px, 80%); }\n.anatomy-notes {\n  display: grid;\n  gap: 16px;\n  max-width: 240px;\n}\n.anatomy-item {\n  display: flex;\n  align-items: flex-start;\n  gap: 12px;\n}\n.anatomy-dot {\n  width: 12px; height: 12px;\n  border-radius: 2px;\n  margin-top: 3px;\n  flex-shrink: 0;\n}\n.anatomy-text strong {\n  display: block;\n  font-size: 13px;\n  font-weight: 600;\n  color: var(--ink);\n  line-height: 1.3;\n}\n.anatomy-text span {\n  font-family: var(--f-mono);\n  font-size: 11px;\n  color: var(--muted2);\n}\n\n.clearspace-demo {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  padding: 56px;\n  border: 2px dashed var(--line-cool);\n  border-radius: var(--r-sm);\n  background: var(--surface);\n  position: relative;\n  margin-bottom: 40px;\n}\n.clearspace-logo { width: min(300px, 70%); }\n.clearspace-lines {\n  position: absolute;\n  inset: 32px;\n  border: 1px dashed rgba(22,212,232,.4);\n  border-radius: 2px;\n  pointer-events: none;\n}\n.clearspace-label {\n  position: absolute;\n  bottom: 12px;\n  right: 16px;\n  font-family: var(--f-mono);\n  font-size: 10px;\n  color: var(--cyan-deep);\n  letter-spacing: .1em;\n  text-transform: uppercase;\n}\n\n.logo-donts {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 12px;\n  margin-top: 32px;\n}\n.dont-item {\n  border: 1px solid var(--line);\n  border-radius: var(--r-sm);\n  overflow: hidden;\n}\n.dont-preview {\n  min-height: 100px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  padding: 20px;\n}\n.dont-label {\n  padding: 12px 14px;\n  border-top: 1px solid var(--line);\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  background: rgba(255,255,255,.7);\n}\n.dont-x {\n  width: 16px; height: 16px;\n  border-radius: 50%;\n  background: var(--crit);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  color: white;\n  font-size: 10px;\n  font-weight: 700;\n  flex-shrink: 0;\n}\n.dont-text {\n  font-size: 12px;\n  color: var(--muted2);\n  line-height: 1.35;\n}\n\n/* ═══════════════════════════════════════════════════════\n   03 — COR PRIMÁRIA\n══════════════════════════════════════════════════════ */\n.swatch-hero {\n  display: grid;\n  grid-template-columns: 1.4fr 1fr 1fr;\n  gap: 12px;\n  margin-bottom: 32px;\n}\n.swatch-big {\n  min-height: 280px;\n  border-radius: var(--r-sm);\n  display: flex;\n  flex-direction: column;\n  justify-content: flex-end;\n  padding: 24px;\n  border: 1px solid rgba(0,0,0,.06);\n}\n.swatch-big.cyan { background: var(--cyan); }\n.swatch-big.graphite { background: var(--graphite); }\n.swatch-big.ink { background: var(--ink); }\n.swatch-big strong {\n  font-family: var(--f-display);\n  font-size: 18px;\n  font-weight: 700;\n  color: var(--ink);\n  line-height: 1.2;\n}\n.swatch-big.graphite strong,\n.swatch-big.ink strong { color: white; }\n.swatch-big span {\n  display: block;\n  margin-top: 4px;\n  font-family: var(--f-mono);\n  font-size: 12px;\n  opacity: .7;\n  color: var(--ink);\n}\n.swatch-big.graphite span,\n.swatch-big.ink span { color: rgba(255,255,255,.7); }\n\n.color-rule-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 16px;\n}\n.c ily: var(--f-mono);\n  font-size: 12px;\n  color: var(--ink);\n}\n\n.status-colors {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 12px;\n  margin-top: 32px;\n}\n.status-swatch {\n  padding: 20px;\n  border-radius: var(--r-sm);\n  border: 1px solid rgba(0,0,0,.06);\n  display: flex;\n  align-items: center;\n  gap: 12px;\n}\n.status-dot {\n  width: 16px; height: 16px;\n  border-radius: 50%;\n  flex-shrink: 0;\n}\n.status-info strong { display: block; font-size: 13px; font-weight: 600; }\n.status-info span { font-family: var(--f-mono); font-size: 11px; color: var(--muted2); }\n\n/* ═══════════════════════════════════════════════════════\n   05 — TIPOGRAFIA\n══════════════════════════════════════════════════════ */\n.type-hero {\n  padding: 56px 0 40px;\n  border-bottom: 1px solid var(--line);\n  margin-bottom: 48px;\n}\n.type-display-sample {\n  font-family: var(--f-display);\n  font-size: clamp(56px, 9vw, 120px);\n  font-weight: 800;\n  letter-spacing: -.045em;\n  line-height: .9;\n  color: var(--ink);\n}\n.type-display-sample em {\n  color: var(--cyan-deep);\n  font-style: italic;\n  font-family: Georgia, serif;\n  font-weight: 400;\n}\n.type-family-row {\n  margin-top: 48px;\n  display: grid;\n  grid-template-columns: 200px 1fr;\n  gap: 32px;\n  padding: 32px 0;\n  border-top: 1px solid var(--line-soft);\n  align-items: start;\n}\n.type-family-meta strong {\n  display: block;\n  font-family: var(--f-display);\n  font-size: 15px;\n  font-weight: 700;\n  color: var(--ink);\n  margin-bottom: 6px;\n}\n.type-family-meta span {\n  font-size: 13px;\n  color: var(--muted2);\n  line-height: 1.5;\n}\n.type-family-meta .role-tag {\n  display: inline-block;\n  margin-top: 10px;\n  padding: 3px 8px;\n  background: var(--cyan-dim);\n  color: var(--cyan-deep);\n  border-radius: 4px;\n  font-family: var(--f-mono);\n  font-size: 10px;\n  font-weight: 600;\n  letter-spacing: .08em;\n  text-transform: uppercase;\n}\n.type-weights { display: flex; flex-direction: \n  border: 1px solid var(--line);\n  border-radius: var(--r-sm);\n  background: rgba(255,255,255,.7);\n}\n.radius-box {\n  width: 56px;\n  height: 56px;\n  background: var(--ink);\n  border: 1px solid var(--line);\n}\n.radius-label {\n  text-align: center;\n}\n.radius-label strong { display: block; font-family: var(--f-mono); font-size: 11px; font-weight: 600; color: var(--ink); }\n.radius-label span { font-family: var(--f-mono); font-size: 10px; color: var(--muted2); }\n\n.shadow-grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 20px;\n}\n.shadow-item {\n  background: white;\n  border-radius: var(--r-sm);\n  padding: 32px 24px;\n  border: 1px solid var(--line);\n  transition: transform 200ms;\n}\n.shadow-sm-demo  { box-shadow: 0 1px 0 rgba(255,255,255,.06) inset, 0 4px 12px -6px rgba(16,24,32,.08); }\n.shadow-md-demo  { box-shadow: 0 1px 0 rgba(255,255,255,.06) inset, 0 8px 24px -10px rgba(16,24,32,.18); }\n.shadow-lg-demo  { box-shadow: 0 1px 0 rgba(255,255,255,.06) inset, 0 30px 60px -40px rgba(11,24,38,.18); }\n.shadow-name { font-family: var(--f-mono); font-size: 11px; font-weight: 600; color: var(--muted2); letter-spacing: .06em; margin-bottom: 4px; }\n.shadow-use  { font-size: 12px; color: var(--muted); }\n\n/* ═══════════════════════════════════════════════════════\n   07 — COMPONENTES\n══════════════════════════════════════════════════════ */\n.comp-section { margin-bottom: 56px; }\n.comp-title {\n  font-family: var(--f-mono);\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: .12em;\n  text-transform: uppercase;\n  color: var(--muted2);\n  margin-bottom: 20px;\n  padding-bottom: 12px;\n  border-bottom: 1px solid var(--line-soft);\n}\n.btn-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }\n.btn {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: 8px;\n  padding: 0 22px;\n  height: 48px;\n  border-radius: var(--r-pill);\n  font-family: var(--f-body);\n  font-size: 14px;\n  font-weight: 600;\n  cursor: pointer;\n  border: 1px solid transparent;\n  transition: transform 160ms var(--ease), box-shadow 160ms var(--ease), background 160ms var(--ease);\n}\n.btn:hover { transform: translateY(-2px); }\n.btn-primary { background: var(--ink); color: white; box-shadow: 0 6px 20px -8px rgba(16,24,32,.35); }\n.btn-primary:hover { background: var(--ink2); }\n.btn-cyan    { background: var(--cyan); color: var(--ink); border-color: var(--cyan); box-shadow: 0 8px 24px -8px rgba(22,212,232,.45); }\n.btn-ghost   { background: transparent; color: var(--ink); border-color: var(--line-cool); }\n.btn-ghost:hover { background: rgba(255,255,255,.6); }\n.btn-sm { height: 36px; padding: 0 16px; font-size: 13px; }\n.btn-lg { height: 56px; padding: 0 28px; font-size: 16px; }\n\n.badge-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }\n.badge {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  padding: 4px 12px;\n  border-radius: var(--r-pill);\n  font-family: var(--f-mono);\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: .04em;\n}\n.badge-cyan   { background: var(--cyan-dim); color: var(--cyan-deep); border: 1px solid rgba(22,212,232,.25); }\n.badge-dark   { background: rgba(26,26,26,.08); color: var(--graphite); border: 1px solid var(--line); }\n.badge-ok     { background: rgba(31,157,111,.1); color: var(--ok); border: 1px solid rgba(31,157,111,.2); }\n.badge-warn   { background: rgba(201,122,27,.1); color: var(--warn); border: 1px solid rgba(201,122,27,.2); }\n.badge-crit   { background: rgba(192,59,59,.1); color: var(--crit); border: 1px solid rgba(192,59,59,.2); }\n.badge-live   { background: rgba(52,211,153,.12); color: var(--ok); border: 1px solid rgba(52,211,153,.25); }\n.badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }\n\n.card-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 8px; }\n.demo-card {\n  padding: 24px;\n  border: 1px solid var(--line);\n  border-radius: var(--r-sm);\n  background: white;\n  box-shadow: 0 4px 12px -6px rgba(16,24,32,.08);\n}\n.demo-card-eyebrow {\n  font-family: var(--f-mono);\n  font-size: 10px;\n  font-weight: 600;\n  letter-spacing: .12em;\n  text-transform: uppercase;\n  color: var(--muted3);\n  margin-bottom: 10px;\n}\n.demo-card h4 { font-family: var(--f-display); font-size: 18px; font-weight: 700; color: var(--ink); line-height: 1.2; margin-bottom: 8px; }\n.demo-card p  { font-size: 14px; color: var(--muted); line-height: 1.55; }\n\n.input-row { display: flex; flex-direction: column; gap: 16px; max-width: 480px; }\n.field-label { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }\n.field-input {\n  width: 100%;\n  height: 48px;\n  padding: 0 16px;\n  border: 1px solid var(--line-cool);\n  border-radius: var(--r-sm);\n  background: white;\n  font-family: var(--f-body);\n  font-size: 15px;\n  color: var(--ink);\n  outline: none;\n  transition: border-color 160ms;\n}\n.field-input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px var(--cyan-dim); }\n.field-input.error { border-color: var(--crit); }\n\n.section-rule-demo {\n  display: flex;\n  align-items: center;\n  gap: 16px;\n  padding: 18px 0;\n  border-bottom: 1px solid var(--ink);\n  margin-top: 8px;\n}\n.rule-num {\n  font-family: var(--f-mono);\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: .12em;\n  text-transform: uppercase;\n  color: var(--muted2);\n}\n\n.dark-panel-demo {\n  padding: 40px;\n  border-radius: var(--r-lg);\n  background:\n    radial-gradient(circle at 15% 0%, rgba(22,212,232,.18), transparent 30%),\n    linear-gradient(135deg, var(--panel), var(--panel2));\n  color: var(--panel-text);\n  margin-top: 8px;\n}\n.dark-panel-demo h4 {\n  font-family: var(--f-display);\n  font-size: 24px;\n  font-weight: 700;\n  color: white;\n  margin-bottom: 12px;\n}\n.dark-panel-demo p { font-size: 15px; color: rgba(213,222,230,.7); line-height: 1.6; }\n\n/* ═══════════════════════════════════════════════════════\n   08 — MOTION\n══════════════════════════════════════════════════════ */\n.motion-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 48px; }\n.motion-demo {\n  padding: 32px;\n  border: 1px solid var(--line);\n  border-radius: var(--r-sm);\n  background: rgba(255,255,255,.7);\n  display: flex;\n  flex-direction: column;\n  align-items: flex-start;\n  gap: 20px;\n}\n.motion-demo h4 { font-family: var(--f-display); font-size: 16px; font-weight: 700; color: var(--ink); }\n.motion-demo p { font-size: 14px; color: var(--muted); line-height: 1.55; }\n.motion-spec {\n  font-family: var(--f-mono);\n  font-size: 11px;\n  color: var(--cyan-deep);\n  background: var(--cyan-dim);\n  padding: 6px 12px;\n  border-radius: var(--r-xs);\n}\n\n.easing-vis {\n  width: 100%;\n  height: 80px;\n  position: relative;\n  border-bottom: 1px solid var(--line-soft);\n}\n.easing-ball {\n  position: absolute;\n  bottom: 8px;\n  width: 12px; height: 12px;\n  border-radius: 50%;\n  background: var(--cyan);\n}\n\n.do-dont-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 16px;\n}\n.do-box, .dont-box {\n  padding: 24px;\n  border-radius: var(--r-sm);\n  border: 1px solid;\n}\n.do-box {\n  background: rgba(31,157,111,.06);\n  border-color: rgba(31,157,111,.2);\n}\n.dont-box {\n  background: rgba(192,59,59,.04);\n  border-color: rgba(192,59,59,.15);\n}\n.do-box strong, .dont-box strong {\n  display: block;\n  font-family: var(--f-mono);\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: .1em;\n  text-transform: uppercase;\n  margin-bottom: 12px;\n}\n.do-box strong { color: var(--ok); }\n.dont-box strong { color: var(--crit); }\n.do-box ul, .dont-box ul { padding-left: 18px; }\n.do-box li, .dont-box li { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 6px; }\n\n/* ═══════════════════════════════════════════════════════\n   09 — VOZ & TOM\n══════════════════════════════════════════════════════ */\n.brand-statement {\n  padding: 40px 48px;\n  border-left: 4px solid var(--cyan);\n  background: rgba(255,255,255,.7);\n  margin-bottom: 40px;\n  border-radius: 0 var(--r-sm) var(--r-sm) 0;\n}\n.brand-statement blockquote {\n  font-family: var(--f-display);\n  font-size: clamp(24px, 3.5vw, 40px);\n  font-weight: 700;\n  letter-spacing: -.025em;\n  line-height: 1.1;\n  color: var(--ink);\n}\n\n.tone-grid {\n  display: grid;\n  grid-template-columns: repeat(2, 1fr);\n  gap: 16px;\n  margin-bottom: 40px;\n}\n.tone-card {\n  padding: 28px;\n  border: 1px solid var(--line);\n  border-radius: var(--r-sm);\n  background: rgba(255,255,255,.7);\n}\n.tone-card h4 {\n  font-family: var(--f-display);\n  font-size: 18px;\n  font-weight: 700;\n  color: var(--ink);\n  margin-bottom: 10px;\n}\n.tone-card p { font-size: 14px; color: var(--muted); line-height: 1.6; }\n\n.copy-examples {\n  display: grid;\n  gap: 16px;\n  margin-bottom: 40px;\n}\n.copy-pair {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 0;\n  border: 1px solid var(--line);\n  border-radius: var(--r-sm);\n  overflow: hidden;\n}\n.copy-bad, .copy-good {\n  padding: 20px 24px;\n}\n.copy-bad {\n  border-right: 1px solid var(--line);\n  background: rgba(192,59,59,.03);\n}\n.copy-good {\n  background: rgba(31,157,111,.04);\n}\n.copy-label {\n  font-family: var(--f-mono);\n  font-size: 10px;\n  font-weight: 600;\n  letter-spacing: .1em;\n  text-transform: uppercase;\n  margin-bottom: 8px;\n}\n.copy-bad .copy-label  { color: var(--crit); }\n.copy-good .copy-label { color: var(--ok); }\n.copy-bad p, .copy-good p {\n  font-size: 15px;\n  color: var(--ink);\n  line-height: 1.5;\n}\n\n.personality-tags {\n  display: flex;\n  flex-wrap: wrap;\n  gap: 8px;\n  margin-top: 24px;\n}\n.ptag {\n  padding: 8px 18px;\n  border: 1px solid var(--line);\n  border-radius: var(--r-pill);\n  font-size: 14px;\n  font-weight: 500;\n  color: var(--ink);\n  background: rgba(255,255,255,.8);\n}\n.ptag.active {\n  background: var(--ink);\n  color: white;\n  border-color: var(--ink);\n}\n\n/* ═══════════════════════════════════════════════════════\n   10 — APLICAÇÕES\n══════════════════════════════════════════════════════ */\n.app-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 24px;\n  margin-bottom: 40px;\n}\n.app-frame {\n  border: 1px solid var(--line);\n  border-radius: var(--r-sm);\n  overflow: hidden;\n  background: white;\n}\n.app-frame-header {\n  padding: 12px 18px;\n  border-bottom: 1px solid var(--line);\n  background: var(--bg-alt);\n  font-family: var(--f-mono);\n  font-size: 10px;\n  font-weight: 600;\n  letter-spacing: .1em;\n  text-transform: uppercase;\n  color: var(--muted3);\n}\n.app-frame-body { padding: 28px; }\n\n/* Social card preview */\n.social-card {\n  background: var(--ink2);\n  color: white;\n  padding: 32px;\n  border-radius: 0;\n  display: flex;\n  flex-direction: column;\n  justify-content: space-between;\n  min-height: 200px;\n  position: relative;\n  overflow: hidden;\n}\n.social-card::before {\n  content: '';\n  position: absolute;\n  inset: 0;\n  background: radial-gradient(circle at 0% 0%, rgba(22,212,232,.2), transparent 40%);\n}\n.social-card-content { position: relative; z-index: 1; }\n.social-card h4 {\n  font-family: var(--f-display);\n  font-size: 22px;\n  font-weight: 800;\n  letter-spacing: -.03em;\n  line-height: 1.1;\n  margin-bottom: 8px;\n}\n.social-card p { font-size: 13px; color: rgba(213,222,230,.65); line-height: 1.5; }\n.social-card-footer {\n  position: relative;\n  z-index: 1;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  margin-top: 24px;\n}\n.social-logo { font-family: var(--f-mono); font-size: 11px; font-weight: 700; letter-spacing: .06em; color: var(--cyan); }\n.social-tag { font-family: var(--f-mono); font-size: 10px; color: rgba(213,222,230,.38); }\n\n/* Proposta preview */\n.proposta-preview {\n  background: var(--surface);\n  padding: 28px;\n}\n.proposta-header { \n  display: flex;\n  justify-content: space-between;\n  align-items: flex-start;\n  margin-bottom: 24px;\n  padding-bottom: 20px;\n  border-bottom: 1px solid var(--line);\n}\n.proposta-num { font-family: var(--f-mono); font-size: 11px; color: var(--muted3); letter-spacing: .08em; }\n.proposta-title { font-family: var(--f-display); font-size: 20px; font-weight: 800; color: var(--ink); letter-spacing: -.02em; margin-top: 4px; }\n.proposta-rows { display: grid; gap: 10px; }\n.proposta-row {\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  padding: 12px 14px;\n  border: 1px solid var(--line-soft);\n  border-radius: var(--r-xs);\n  background: var(--bg-alt);\n}\n.proposta-row-name { font-size: 13px; font-weight: 600; color: var(--ink); }\n.proposta-row-val { font-family: var(--f-mono); font-size: 12px; color: var(--cyan-deep); }\n.proposta-total {\n  margin-top: 16px;\n  padding: 14px 16px;\n  background: var(--ink);\n  border-radius: var(--r-sm);\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  color: white;\n}\n.proposta-total span { font-size: 13px; font-weight: 600; letter-spacing: .02em; }\n.proposta-total strong { font-family: var(--f-display); font-size: 18px; font-weight: 800; }\n\n/* Landing section preview */\n.landing-preview {\n  background: var(--bg);\n  padding: 32px;\n  display: flex;\n  flex-direction: column;\n  gap: 16px;\n}\n.landing-eyebrow { font-family: var(--f-mono); font-size: 10px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--cyan-deep); }\n.landing-h { font-family: var(--f-display); font-size: 32px; font-weight: 800; letter-spacing: -.035em; line-height: .95; color: var(--ink); }\n.landing-h em { font-style: italic; font-family: Georgia, serif; font-weight: 400; color: var(--cyan-deep); }\n.landing-p { font-size: 14px; color: var(--muted); max-width: 42ch; line-height: 1.6; }\n.landing-actions { display: flex; gap: 10px; }\n\n/* Doc preview */\n.doc-preview {\n  background: white;\n  padding: 28px;\n}\n.doc-heading-row {\n  display: flex;\n  align-items: center;\n  gap: 14px;\n  margin-bottom: 16px;\n  padding-bottom: 14px;\n  border-bottom: 1px solid var(--ink);\n}\n.doc-num { font-family: var(--f-mono); font-size: 11px; color: var(--muted2); }\n.doc-h { font-family: var(--f-display); font-size: 22px; font-weight: 800; color: var(--ink); letter-spacing: -.02em; }\n.doc-p { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 12px; }\n.doc-highlight { \n  padding: 14px 18px; \n  border-left: 3px solid var(--cyan);\n  background: rgba(22,212,232,.06);\n  font-size: 13px;\n  color: var(--ink);\n  font-weight: 500;\n  margin-top: 12px;\n  border-radius: 0 var(--r-xs) var(--r-xs) 0;\n}\n\n/* ─── FOOTER ─────────────────────────────────────────── */\n.footer {\n  padding: 56px clamp(40px, 7vw, 96px);\n  background: var(--panel);\n  color: var(--panel-text);\n  border-top: 1px solid rgba(255,255,255,.06);\n}\n.footer-inner {\n  display: flex;\n  justify-content: space-between;\n  align-items: flex-start;\n  gap: 32px;\n  flex-wrap: wrap;\n}\n.footer-logo { width: 180px; margin-bottom: 16px; }\n.footer-copy { font-size: 13px; color: rgba(213,222,230,.45); line-height: 1.6; max-width: 40ch; }\n.footer-meta {\n  display: flex;\n  gap: 40px;\n  flex-wrap: wrap;\n}\n.footer-col strong {\n  display: block;\n  font-family: var(--f-mono);\n  font-size: 10px;\n  font-weight: 600;\n  letter-spacing: .12em;\n  text-transform: uppercase;\n  color: rgba(213,222,230,.35);\n  margin-bottom: 10px;\n}\n.footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }\n.footer-col li { font-size: 13px; color: rgba(213,222,230,.55); }\n\n/* ─── SCROLL REVEAL ──────────────────────────────────── */\n.reveal {\n  opacity: 0;\n  transform: translateY(24px);\n  transition: opacity 480ms var(--ease), transform 480ms var(--ease);\n}\n.reveal.visible {\n  opacity: 1;\n  transform: none;\n}\n\n/* ─── RESPONSIVE ─────────────────────────────────────── */\n@media (max-width: 1024px) {\n  .page { grid-template-columns: 1fr; }\n  .sidebar { position: fixed; left: -220px; z-index: 200; transition: left 280ms var(--ease); }\n  .sidebar.open { left: 0; }\n  .mobile-nav-btn {\n    display: flex;\n    position: fixed;\n    top: 16px; left: 16px;\n    z-index: 201;\n    width: 40px; height: 40px;\n    background: var(--ink2);\n    border: 1px solid rgba(255,255,255,.1);\n    border-radius: var(--r-sm);\n    align-items: center;\n    justify-content: center;\n    cursor: pointer;\n    gap: 3px;\n    flex-direction: column;\n    padding: 10px;\n  }\n  .mobile-nav-btn span {\n    display: block;\n    width: 100%; height: 2px;\n    background: var(--panel-text);\n    border-radius: 2px;\n    transition: transform 200ms;\n  }\n}\n@media (min-width: 1025px) {\n  .mobile-nav-btn { display: none; }\n}\n@media (max-width: 768px) {\n  .g2, .g3, .g4, .g5 { grid-template-columns: 1fr; }\n  .logo-showcase, .swatch-hero, .color-rule-grid { grid-template-columns: 1fr; }\n  .logo-donts { grid-template-columns: 1fr 1fr; }\n  .tone-grid, .motion-grid, .app-grid, .copy-pair, .do-dont-grid { grid-template-columns: 1fr; }\n  .card-row { grid-template-columns: 1fr; }\n  .status-colors { grid-template-columns: 1fr 1fr; }\n  .radius-grid { grid-template-columns: repeat(3, 1fr); }\n  .type-family-row { grid-template-columns: 1fr; }\n  .proposta-header { flex-direction: column; }\n  .cover-bottom { flex-direction: column; }\n  .shadow-grid { grid-template-columns: 1fr; }\n  .spacing-row { grid-template-columns: 80px 1fr 60px; }\n  .spacing-row .spacing-usage { display: none; }\n}\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after {\n    animation-duration: .01ms !important;\n    transition-duration: .01ms !important;\n    scroll-behavior: auto !important;\n  }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- MOBILE NAV BUTTON -->\n<button class=\"mobile-nav-btn\" id=\"mobileNavBtn\" aria-label=\"Abrir menu\">\n  <span><\u002Fspan><span><\u002Fspan><span><\u002Fspan>\n<\u002Fbutton>\n\n<div class=\"page\">\n\n<!-- ─── SIDEBAR ──────────────────────────────────────── -->\n<aside class=\"sidebar\" id=\"sidebar\">\n  <div class=\"sidebar-logo\">\n    <img src=\"350d6a8f-6843-4678-ba44-31212d282d4b\" alt=\"Variant Mídia\">\n    <p class=\"sidebar-label\">Brand Guidelines<\u002Fp>\n  <\u002Fdiv>\n  <nav>\n    <ul class=\"nav-list\">\n      <li class=\"nav-item\"><a href=\"#cover\" class=\"active\"><span class=\"nav-num\">—<\u002Fspan> Capa<\u002Fa><\u002Fli>\n      <li class=\"nav-item\"><a href=\"#marca\"><span class=\"nav-num\">01<\u002Fspan> Marca &amp; Logo<\u002Fa><\u002Fli>\n      <li class=\"nav-item\"><a href=\"#cor-primaria\"><span class=\"nav-num\">02<\u002Fspan> Cor Primária<\u002Fa><\u002Fli>\n      <li class=\"nav-item\"><a href=\"#paleta\"><span class=\"nav-num\">03<\u002Fspan> Paleta Expandida<\u002Fa><\u002Fli>\n      <li class=\"nav-item\"><a href=\"#tipografia\"><span class=\"nav-num\">04<\u002Fspan> Tipografia<\u002Fa><\u002Fli>\n      <li class=\"nav-item\"><a href=\"#espacamento\"><span class=\"nav-num\">05<\u002Fspan> Espaçamento<\u002Fa><\u002Fli>\n      <li class=\"nav-item\"><a href=\"#componentes\"><span class=\"nav-num\">06<\u002Fspan> Componentes<\u002Fa><\u002Fli>\n      <li class=\"nav-item\"><a href=\"#motion\"><span class=\"nav-num\">07<\u002Fspan> Motion<\u002Fa><\u002Fli>\n      <li class=\"nav-item\"><a href=\"#voz\"><span class=\"nav-num\">08<\u002Fspan> Voz &amp; Tom<\u002Fa><\u002Fli>\n      <li class=\"nav-item\"><a href=\"#aplicacoes\"><span class=\"nav-num\">09<\u002Fspan> Aplicações<\u002Fa><\u002Fli>\n    <\u002Ful>\n  <\u002Fnav>\n<\u002Faside>\n\n<!-- ─── MAIN ──────────────────────────────────────────── -->\n<main class=\"main\">\n\n<!-- ══ 00 CAPA ══════════════════════════════════════════ -->\n<section id=\"cover\" data-screen-label=\"Capa\">\n  <div class=\"cover-grid-bg\"><\u002Fdiv>\n  <div class=\"cover-top\">\n    <img class=\"cover-logo\" src=\"350d6a8f-6843-4678-ba44-31212d282d4b\" alt=\"Variant Mídia\">\n  <\u002Fdiv>\n  <div class=\"cover-mid\">\n    <div class=\"cover-headline\">\n      Brand<br><em>Guidelines<\u002Fem>\n    <\u002Fdiv>\n    <p class=\"cover-sub\">Sistema visual completo da Variant Mídia. Cores, tipografia, componentes, voz e regras de uso para todas as aplicações da marca.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"cover-bottom\">\n    <div class=\"cover-meta\">\n      <div class=\"cover-meta-item\">\n        <strong>Versão<\u002Fstrong>\n        <span>1.0<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"cover-meta-item\">\n        <strong>Atualizado<\u002Fstrong>\n        <span>Maio 2026<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"cover-meta-item\">\n        <strong>Segmento<\u002Fstrong>\n        <span>Marketing &amp; Operação Comercial<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"cover-meta-item\">\n        <strong>Uso<\u002Fstrong>\n        <span>Interno &amp; Parceiros<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <span class=\"cover-version\">variantmidia.com.br<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ 01 MARCA & LOGO ═══════════════════════════════════ -->\n<section id=\"marca\" class=\"section\" data-screen-label=\"01 Marca e Logo\">\n  <div class=\"section-rule\">\n    <span class=\"section-num\">01<\u002Fspan>\n    <div class=\"section-divider\"><\u002Fdiv>\n    <span class=\"section-tag\">Marca &amp; Logo<\u002Fspan>\n  <\u002Fdiv>\n\n  <h2 class=\"section-title reveal\">A <em>marca<\u002Fem><br>em toda parte.<\u002Fh2>\n  <p class=\"section-intro reveal\">O símbolo ciano e o wordmark grafite formam o par central. Toda variação parte desse núcleo — nunca se afasta da proporção, do espaçamento ou dos pares de cor aprovados.<\u002Fp>\n\n  <div class=\"logo-showcase reveal\">\n    <div class=\"logo-block on-light\">\n      <img src=\"705ad1ff-3266-4dcb-8c17-4db57558b0fc\" alt=\"Logo horizontal — fundo claro\">\n    <\u002Fdiv>\n    <div class=\"logo-block on-dark\">\n      <img src=\"350d6a8f-6843-4678-ba44-31212d282d4b\" alt=\"Logo horizontal — fundo escuro\">\n    <\u002Fdiv>\n    <div class=\"logo-block on-warm\">\n      <img src=\"705ad1ff-3266-4dcb-8c17-4db57558b0fc\" alt=\"Logo horizontal — fundo quente\">\n    <\u002Fdiv>\n    <div class=\"logo-block on-graphite\">\n      <img src=\"350d6a8f-6843-4678-ba44-31212d282d4b\" alt=\"Logo horizontal — fundo grafite\">\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"logo-anatomy reveal\">\n    <img class=\"anatomy-logo\" src=\"705ad1ff-3266-4dcb-8c17-4db57558b0fc\" alt=\"Anatomy\">\n    <div class=\"anatomy-notes\">\n      <div class=\"anatomy-item\">\n        <div class=\"anatomy-dot\" style=\"background:#16D4E8;\"><\u002Fdiv>\n        <div class=\"anatomy-text\">\n          <strong>Símbolo ciano<\u002Fstrong>\n          <span>#16D4E8 — assinatura visual<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"anatomy-item\">\n        <div class=\"anatomy-dot\" style=\"background:#2B2B2B;\"><\u002Fdiv>\n        <div class=\"anatomy-text\">\n          <strong>Wordmark grafite<\u002Fstrong>\n          <span>#2B2B2B — em fundos claros<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"anatomy-item\">\n        <div class=\"anatomy-dot\" style=\"background:#FFFFFF; border:1px solid #E2E2D6;\"><\u002Fdiv>\n        <div class=\"anatomy-text\">\n          <strong>Wordmark branco<\u002Fstrong>\n          <span>#FFFFFF — em fundos escuros<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"clearspace-demo reveal\">\n    <div class=\"clearspace-lines\"><\u002Fdiv>\n    <img class=\"clearspace-logo\" src=\"705ad1ff-3266-4dcb-8c17-4db57558b0fc\" alt=\"Clear space\">\n    <span class=\"clearspace-label\">Área mínima de respiro = altura do símbolo<\u002Fspan>\n  <\u002Fdiv>\n\n  <div class=\"grid g2 reveal\" style=\"margin-bottom:40px;\">\n    <div class=\"card\">\n      <div class=\"eyebrow\">Versões disponíveis<\u002Fdiv>\n      <ul style=\"list-style:none; display:flex; flex-direction:column; gap:10px; margin-top:4px;\">\n        <li style=\"font-size:14px; color:var(--muted); display:flex; gap:10px; align-items:baseline;\"><span style=\"color:var(--cyan); font-family:var(--f-mono); font-size:11px;\">→<\u002Fspan> Horizontal light (grafite + ciano)<\u002Fli>\n        <li style=\"font-size:14px; color:var(--muted); display:flex; gap:10px; align-items:baseline;\"><span style=\"color:var(--cyan); font-family:var(--f-mono); font-size:11px;\">→<\u002Fspan> Horizontal dark (branco + ciano)<\u002Fli>\n        <li style=\"font-size:14px; color:var(--muted); display:flex; gap:10px; align-items:baseline;\"><span style=\"color:var(--cyan); font-family:var(--f-mono); font-size:11px;\">→<\u002Fspan> Vertical light &amp; dark<\u002Fli>\n        <li style=\"font-size:14px; color:var(--muted); display:flex; gap:10px; align-items:baseline;\"><span style=\"color:var(--cyan); font-family:var(--f-mono); font-size:11px;\">→<\u002Fspan> Símbolo isolado (uso restrito)<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <div class=\"eyebrow\">Tamanho mínimo<\u002Fdiv>\n      <div style=\"margin-top:8px;\">\n        <div style=\"display:flex; gap:24px; align-items:flex-end; margin-bottom:16px;\">\n          <div>\n            <span style=\"font-family:var(--f-mono); font-size:11px; color:var(--muted2); display:block; margin-bottom:4px;\">Digital<\u002Fspan>\n            <span style=\"font-family:var(--f-display); font-size:32px; font-weight:800; color:var(--cyan-deep);\">120px<\u002Fspan>\n          <\u002Fdiv>\n          <div>\n            <span style=\"font-family:var(--f-mono); font-size:11px; color:var(--muted2); display:block; margin-bottom:4px;\">Impresso<\u002Fspan>\n            <span style=\"font-family:var(--f-display); font-size:32px; font-weight:800; color:var(--ink);\">30mm<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:13px; color:var(--muted); line-height:1.55;\">Abaixo desses limites, usar apenas o símbolo isolado com aprovação.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"eyebrow reveal\" style=\"margin-bottom:16px;\">O que não fazer<\u002Fdiv>\n  <div class=\"logo-donts reveal\">\n    <div class=\"dont-item\">\n      <div class=\"dont-preview\" style=\"background: linear-gradient(135deg, #7c3aed, #ec4899);\">\n        <img src=\"705ad1ff-3266-4dcb-8c17-4db57558b0fc\" alt=\"\" style=\"width:120px; filter:brightness(0) invert(1);\">\n      <\u002Fdiv>\n      <div class=\"dont-label\"><div class=\"dont-x\">✕<\u002Fdiv><span class=\"dont-text\">Não usar sobre gradientes ou cores não aprovadas<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"dont-item\">\n      <div class=\"dont-preview\" style=\"background:var(--bg-alt);\">\n        <img src=\"705ad1ff-3266-4dcb-8c17-4db57558b0fc\" alt=\"\" style=\"width:120px; transform:rotate(-12deg);\">\n      <\u002Fdiv>\n      <div class=\"dont-label\"><div class=\"dont-x\">✕<\u002Fdiv><span class=\"dont-text\">Não rotacionar ou distorcer a marca<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"dont-item\">\n      <div class=\"dont-preview\" style=\"background:var(--surface);\">\n        <img src=\"705ad1ff-3266-4dcb-8c17-4db57558b0fc\" alt=\"\" style=\"width:120px; filter:grayscale(1) opacity(.3);\">\n      <\u002Fdiv>\n      <div class=\"dont-label\"><div class=\"dont-x\">✕<\u002Fdiv><span class=\"dont-text\">Não usar versão desbotada ou com baixo contraste<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ 02 COR PRIMÁRIA ═══════════════════════════════════ -->\n<section id=\"cor-primaria\" class=\"section\" data-screen-label=\"02 Cor Primária\">\n  <div class=\"section-rule\">\n    <span class=\"section-num\">02<\u002Fspan>\n    <div class=\"section-divider\"><\u002Fdiv>\n    <span class=\"section-tag\">Cor Primária<\u002Fspan>\n  <\u002Fdiv>\n\n  <h2 class=\"section-title reveal\">Ciano<br><em>preciso.<\u002Fem><\u002Fh2>\n  <p class=\"section-intro reveal\">Três cores formam o núcleo da marca. O ciano é a assinatura visual — sempre pontual, nunca dominante. O grafite e o ink carregam autoridade e massa tipográfica.<\u002Fp>\n\n  <div class=\"swatch-hero reveal\">\n    <div class=\"swatch-big cyan\">\n      <strong>Ciano Assinatura<\u002Fstrong>\n      <span>#16D4E8<\u002Fspan>\n      <span style=\"margin-top:2px;\">rgb(22, 212, 232)<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"swatch-big graphite\">\n      <strong>Grafite Logo<\u002Fstrong>\n      <span>#2B2B2B<\u002Fspan>\n      <span>rgb(43, 43, 43)<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"swatch-big ink\">\n      <strong>Ink<\u002Fstrong>\n      <span>#1A1A1A<\u002Fspan>\n      <span>rgb(26, 26, 26)<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"color-rule-grid reveal\">\n    <div class=\"color-rule\">\n      <h4>Regra do ciano<\u002Fh4>\n      <p>O ciano nunca vira fundo dominante. Aparece como assinatura do símbolo, marcador de seção, sublinhado, foco de campo, badge de status e CTA secundário pontual.<\u002Fp>\n      <div class=\"cyan-usage\">\n        <span class=\"usage-chip\">Símbolo<\u002Fspan>\n        <span class=\"usage-chip\">Sublinhado<\u002Fspan>\n        <span class=\"usage-chip\">Foco<\u002Fspan>\n        <span class=\"usage-chip\">Status live<\u002Fspan>\n        <span class=\"usage-chip\">CTA pontual<\u002Fspan>\n        <span class=\"usage-chip\">Marcador de seção<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"color-rule\">\n      <h4>Regra do grafite &amp; ink<\u002Fh4>\n      <p>Grafite e ink seguram a autoridade: wordmark, headlines, botões primários, divisores fortes. O grafite vai no wordmark; ink vai em texto corrido e UI. Nunca misturar os dois na mesma superfície.<\u002Fp>\n      <div class=\"cyan-usage\">\n        <span class=\"usage-chip\" style=\"background:rgba(43,43,43,.08); color:var(--graphite); border-color:rgba(43,43,43,.15);\">Wordmark<\u002Fspan>\n        <span class=\"usage-chip\" style=\"background:rgba(43,43,43,.08); color:var(--graphite); border-color:rgba(43,43,43,.15);\">Headlines<\u002Fspan>\n        <span class=\"usage-chip\" style=\"background:rgba(43,43,43,.08); color:var(--graphite); border-color:rgba(43,43,43,.15);\">Botão primário<\u002Fspan>\n        <span class=\"usage-chip\" style=\"background:rgba(43,43,43,.08); color:var(--graphite); border-color:rgba(43,43,43,.15);\">Divisores<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"reveal\" style=\"margin-top:40px;\">\n    <div class=\"eyebrow\" style=\"margin-bottom:20px;\">Pares de cor aprovados<\u002Fdiv>\n    <div class=\"grid g3\">\n      <div style=\"padding:24px; border-radius:var(--r-sm); background:var(--ink2); display:flex; flex-direction:column; gap:16px;\">\n        <img src=\"350d6a8f-6843-4678-ba44-31212d282d4b\" alt=\"logo dark\" style=\"width:140px;\">\n        <span style=\"font-family:var(--f-mono); font-size:10px; color:rgba(213,222,230,.45); letter-spacing:.1em; text-transform:uppercase;\">Escuro #0E1620<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"padding:24px; border-radius:var(--r-sm); background:var(--surface); border:1px solid var(--line); display:flex; flex-direction:column; gap:16px;\">\n        <img src=\"705ad1ff-3266-4dcb-8c17-4db57558b0fc\" alt=\"logo light\" style=\"width:140px;\">\n        <span style=\"font-family:var(--f-mono); font-size:10px; color:var(--muted3); letter-spacing:.1em; text-transform:uppercase;\">Branco #FFFFFF<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"padding:24px; border-radius:var(--r-sm); background:var(--bg); border:1px solid var(--line); display:flex; flex-direction:column; gap:16px;\">\n        <img src=\"705ad1ff-3266-4dcb-8c17-4db57558b0fc\" alt=\"logo warm\" style=\"width:140px;\">\n        <span style=\"font-family:var(--f-mono); font-size:10px; color:var(--muted3); letter-spacing:.1em; text-transform:uppercase;\">Fundo quente #F2F4F1<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ 03 PALETA EXPANDIDA ═══════════════════════════════ -->\n<section id=\"paleta\" class=\"section\" data-screen-label=\"03 Paleta Expandida\">\n  <div class=\"section-rule\">\n    <span class=\"section-num\">03<\u002Fspan>\n    <div class=\"section-divider\"><\u002Fdiv>\n    <span class=\"section-tag\">Paleta Expandida<\u002Fspan>\n  <\u002Fdiv>\n\n  <h2 class=\"section-title reveal\">Sistema<br>de <em>tokens.<\u002Fem><\u002Fh2>\n  <p class=\"section-intro reveal\">Cada valor tem nome semântico, papel definido e contexto de uso. Nenhuma cor é decorativa — toda entrada da paleta resolve um problema visual específico.<\u002Fp>\n\n  <div class=\"reveal\">\n    <div class=\"eyebrow\" style=\"margin-bottom:16px;\">Fundos &amp; Superfícies<\u002Fdiv>\n    <table class=\"token-table\" style=\"margin-bottom:40px;\">\n      <thead>\n        <tr>\n          <th style=\"width:56px;\">Cor<\u002Fth>\n          <th>Nome<\u002Fth>\n          <th>Papel<\u002Fth>\n          <th>Token CSS<\u002Fth>\n          <th>Hex<\u002Fth>\n        <\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr>\n          <td><div class=\"t-chip\" style=\"background:#F2F4F1;\"><\u002Fdiv><\u002Ftd>\n          <td class=\"t-name\">Background principal<\u002Ftd>\n          <td class=\"t-role\">Base clara levemente quente. Evita branco puro como campo dominante.<\u002Ftd>\n          <td><span class=\"t-token\">--vm-bg<\u002Fspan><\u002Ftd>\n          <td class=\"t-hex\">#F2F4F1<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><div class=\"t-chip\" style=\"background:#F7FAFA;\"><\u002Fdiv><\u002Ftd>\n          <td class=\"t-name\">Background frio<\u002Ftd>\n          <td class=\"t-role\">Alternância de ritmo para hero, método e módulos técnicos.<\u002Ftd>\n          <td><span class=\"t-token\">--vm-bg-alt<\u002Fspan><\u002Ftd>\n          <td class=\"t-hex\">#F7FAFA<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><div class=\"t-chip\" style=\"background:#FFFFFF; border:1px solid #E2E2D6;\"><\u002Fdiv><\u002Ftd>\n          <td class=\"t-name\">Surface<\u002Ftd>\n          <td class=\"t-role\">Cards, painéis e módulos. Usar com borda, não com sombra pesada.<\u002Ftd>\n          <td><span class=\"t-token\">--vm-surface<\u002Fspan><\u002Ftd>\n          <td class=\"t-hex\">#FFFFFF<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><div class=\"t-chip\" style=\"background:#0E1620;\"><\u002Fdiv><\u002Ftd>\n          <td class=\"t-name\">Painel escuro<\u002Ftd>\n          <td class=\"t-role\">Hero escuro, bastidor operacional, seções de IA e live.<\u002Ftd>\n          <td><span class=\"t-token\">--vm-panel<\u002Fspan><\u002Ftd>\n          <td class=\"t-hex\">#0E1620<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><div class=\"t-chip\" style=\"background:#131C27;\"><\u002Fdiv><\u002Ftd>\n          <td class=\"t-name\">Painel escuro 2<\u002Ftd>\n          <td class=\"t-role\">Variação para gradiente sutil em painéis escuros.<\u002Ftd>\n          <td><span class=\"t-token\">--vm-panel-2<\u002Fspan><\u002Ftd>\n          <td class=\"t-hex\">#131C27<\u002Ftd>\n        <\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n\n    <div class=\"eyebrow\" style=\"margin-bottom:16px;\">Linhas &amp; Bordas<\u002Fdiv>\n    <table class=\"token-table\" style=\"margin-bottom:40px;\">\n      <thead>\n        <tr>\n          <th style=\"width:56px;\">Cor<\u002Fth>\n          <th>Nome<\u002Fth>\n          <th>Papel<\u002Fth>\n          <th>Token CSS<\u002Fth>\n          <th>Hex<\u002Fth>\n        <\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr>\n          <td><div class=\"t-chip\" style=\"background:#E2E2D6;\"><\u002Fdiv><\u002Ftd>\n          <td class=\"t-name\">Linha quente<\u002Ftd>\n          <td class=\"t-role\">Bordas e divisores sobre fundo principal quente.<\u002Ftd>\n          <td><span class=\"t-token\">--vm-line<\u002Fspan><\u002Ftd>\n          <td class=\"t-hex\">#E2E2D6<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><div class=\"t-chip\" style=\"background:#E6EEF2;\"><\u002Fdiv><\u002Ftd>\n          <td class=\"t-name\">Linha fria<\u002Ftd>\n          <td class=\"t-role\">Bordas sobre fundo frio e módulos técnicos.<\u002Ftd>\n          <td><span class=\"t-token\">--vm-line-cool<\u002Fspan><\u002Ftd>\n          <td class=\"t-hex\">#E6EEF2<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><div class=\"t-chip\" style=\"background:#EFF4F6;\"><\u002Fdiv><\u002Ftd>\n          <td class=\"t-name\">Linha suave<\u002Ftd>\n          <td class=\"t-role\">Grid de fundo, divisores muito sutis, zebra de tabelas.<\u002Ftd>\n          <td><span class=\"t-token\">--vm-line-soft<\u002Fspan><\u002Ftd>\n          <td class=\"t-hex\">#EFF4F6<\u002Ftd>\n        <\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n\n    <div class=\"eyebrow\" style=\"margin-bottom:16px;\">Texto &amp; Escala de cinza<\u002Fdiv>\n    <table class=\"token-table\" style=\"margin-bottom:40px;\">\n      <thead>\n        <tr>\n          <th style=\"width:56px;\">Cor<\u002Fth>\n          <th>Nome<\u002Fth>\n          <th>Papel<\u002Fth>\n          <th>Token CSS<\u002Fth>\n          <th>Hex<\u002Fth>\n        <\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr>\n          <td><div class=\"t-chip\" style=\"background:#101820;\"><\u002Fdiv><\u002Ftd>\n          <td class=\"t-name\">Ink 2<\u002Ftd>\n          <td class=\"t-role\">Headline máxima, fundo escuro alternativo.<\u002Ftd>\n          <td><span class=\"t-token\">--vm-ink-2<\u002Fspan><\u002Ftd>\n          <td class=\"t-hex\">#101820<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><div class=\"t-chip\" style=\"background:#1A1A1A;\"><\u002Fdiv><\u002Ftd>\n          <td class=\"t-name\">Ink<\u002Ftd>\n          <td class
